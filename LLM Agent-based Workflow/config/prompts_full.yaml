    ## Key Notes
    1. **All parameters must come from the input MDP definition and RL algorithm design**, do not fabricate parameter values
    2. **Code must be directly runnable**, no placeholders or TODOs allowed
    3. **Imports must be complete**, do not omit any dependencies
    4. **matplotlib plots** must use `plt.savefig()` to save to file, and also `plt.show()`
    5. **English comments**, key logic must have explanatory comments
    6. If the MDP definition contains specific parameter ranges (e.g., generator capacity [50,200]MW), these specific values must be used in the code
    7. The environment's observation_space and action_space dimensions must strictly match the MDP definition

    ## Self-Review (Must Execute)
    After generating the code, check each item:
    1. **Runnability**: Are all imports complete? Is the syntax correct? Are there any undefined variables?
    2. **Completeness**: Does it include all 5 parts: environment + network + training + evaluation + visualization?
    3. **MDP Consistency**: Are state dimensions, action dimensions, and reward formula consistent with the input?
    4. **Algorithm Consistency**: Are the RL algorithm and hyperparameters consistent with the input?
    5. **Network Consistency**: Are the number of layers, width, and activation functions consistent with the input?
    6. **No Placeholders**: Are there any `...`, `TODO`, `pass`, or other unimplemented parts in the code?
    If issues are found, directly output the corrected final version.
